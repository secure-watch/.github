name: Bug report
description: Report a reproducible problem in Secure Watch
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Please remove tokens, credentials, internal URLs, and other sensitive information.

  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible example.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected and actual results
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment or context
      description: Include only the repository, OS, tools, and versions relevant to reproduction.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Include relevant logs after removing sensitive information.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
