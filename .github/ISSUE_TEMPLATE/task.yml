name: Task
description: Track an actionable Secure Watch task
title: "[Task]: "
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be done and why?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Describe what is included and excluded.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this task is complete?
    validations:
      required: true

  - type: input
    id: related
    attributes:
      label: Related discussion or issue
      placeholder: https://github.com/...
